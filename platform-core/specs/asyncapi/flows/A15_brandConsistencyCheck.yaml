asyncapi: 3.0.0
info:
  title: "A15 - stylist -> beeldenmaker/brandConsistencyCheck"
  version: 1.0.0
  description: "HolidaiButler inter-agent flow A15"

channels:
  beeldenmaker-brandConsistencyCheck:
    address: a2a.beeldenmaker.brandConsistencyCheck
    messages:
      brandConsistencyCheckRequest:
        payload:
          type: object
          properties:
            sourceAgent:
              type: string
              description: Agent that initiated this flow

operations:
  invokeBrandConsistencyCheck:
    action: send
    channel:
      $ref: "#/channels/beeldenmaker-brandConsistencyCheck"
    messages:
      - $ref: "#/channels/beeldenmaker-brandConsistencyCheck/messages/brandConsistencyCheckRequest"
