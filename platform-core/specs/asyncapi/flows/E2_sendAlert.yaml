asyncapi: 3.0.0
info:
  title: "E2 - anomaliedetective -> bode/sendAlert"
  version: 1.0.0
  description: "HolidaiButler inter-agent flow E2"

channels:
  bode-sendAlert:
    address: a2a.bode.sendAlert
    messages:
      sendAlertRequest:
        payload:
          type: object
          properties:
            sourceAgent:
              type: string
              description: Agent that initiated this flow

operations:
  invokeSendAlert:
    action: send
    channel:
      $ref: "#/channels/bode-sendAlert"
    messages:
      - $ref: "#/channels/bode-sendAlert/messages/sendAlertRequest"
