asyncapi: 3.0.0
info:
  title: "B1 - maestro -> koerier/triggerSync"
  version: 1.0.0
  description: "HolidaiButler inter-agent flow B1"

channels:
  koerier-triggerSync:
    address: a2a.koerier.triggerSync
    messages:
      triggerSyncRequest:
        payload:
          type: object
          properties:
            sourceAgent:
              type: string
              description: Agent that initiated this flow

operations:
  invokeTriggerSync:
    action: send
    channel:
      $ref: "#/channels/koerier-triggerSync"
    messages:
      - $ref: "#/channels/koerier-triggerSync/messages/triggerSyncRequest"
