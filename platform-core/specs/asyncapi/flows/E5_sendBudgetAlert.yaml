asyncapi: 3.0.0
info:
  title: "E5 - boekhouder -> bode/sendBudgetAlert"
  version: 1.0.0
  description: "HolidaiButler inter-agent flow E5"

channels:
  bode-sendBudgetAlert:
    address: a2a.bode.sendBudgetAlert
