asyncapi: 3.0.0
info:
  title: "B3 - maestro -> kassier/checkBudget"
  version: 1.0.0
  description: "HolidaiButler inter-agent flow B3"

channels:
  kassier-checkBudget:
    address: a2a.kassier.checkBudget
    messages:
      checkBudgetRequest:
        payload:
          type: object
          properties:
            sourceAgent:
              type: string
              description: Agent that initiated this flow

operations:
  invokeCheckBudget:
    action: send
    channel:
      $ref: "#/channels/kassier-checkBudget"
    messages:
      - $ref: "#/channels/kassier-checkBudget/messages/checkBudgetRequest"
