asyncapi: 3.0.0
info:
  title: "BS1 - bewaker -> auditeur/logSecurityFinding"
  version: 1.0.0
  description: "HolidaiButler inter-agent flow BS1"

channels:
  auditeur-logSecurityFinding:
    address: a2a.auditeur.logSecurityFinding
    messages:
      logSecurityFindingRequest:
        payload:
          type: object
          properties:
            sourceAgent:
              type: string
              description: Agent that initiated this flow

operations:
  invokeLogSecurityFinding:
    action: send
    channel:
      $ref: "#/channels/auditeur-logSecurityFinding"
    messages:
      - $ref: "#/channels/auditeur-logSecurityFinding/messages/logSecurityFindingRequest"
