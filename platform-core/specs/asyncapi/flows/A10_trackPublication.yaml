asyncapi: 3.0.0
info:
  title: "A10 - uitgever -> performanceWachter/trackPublication"
  version: 1.0.0
  description: "HolidaiButler inter-agent flow A10"

channels:
  performanceWachter-trackPublication:
    address: a2a.performanceWachter.trackPublication
