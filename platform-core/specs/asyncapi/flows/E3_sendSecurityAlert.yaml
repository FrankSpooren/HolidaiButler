asyncapi: 3.0.0
info:
  title: "E3 - bewaker -> bode/sendSecurityAlert"
  version: 1.0.0
  description: "HolidaiButler inter-agent flow E3"

channels:
  bode-sendSecurityAlert:
    address: a2a.bode.sendSecurityAlert
    messages:
      sendSecurityAlertRequest:
        payload:
          type: object
          properties:
            sourceAgent:
              type: string
              description: Agent that initiated this flow

operations:
  invokeSendSecurityAlert:
    action: send
    channel:
      $ref: "#/channels/bode-sendSecurityAlert"
    messages:
      - $ref: "#/channels/bode-sendSecurityAlert/messages/sendSecurityAlertRequest"
