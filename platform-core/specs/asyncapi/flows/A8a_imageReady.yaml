asyncapi: 3.0.0
info:
  title: "A8a - beeldenmaker -> redacteur/imageReady"
  version: 1.0.0
  description: "HolidaiButler inter-agent flow A8a"

channels:
  redacteur-imageReady:
    address: a2a.redacteur.imageReady
    messages:
      imageReadyRequest:
        payload:
          type: object
          properties:
            sourceAgent:
              type: string
              description: Agent that initiated this flow

operations:
  invokeImageReady:
    action: send
    channel:
      $ref: "#/channels/redacteur-imageReady"
    messages:
      - $ref: "#/channels/redacteur-imageReady/messages/imageReadyRequest"
