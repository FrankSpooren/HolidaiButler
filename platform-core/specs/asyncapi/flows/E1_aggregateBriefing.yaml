asyncapi: 3.0.0
info:
  title: "E1 - ALL -> bode/aggregateBriefing"
  version: 1.0.0
  description: "HolidaiButler inter-agent flow E1"

channels:
  bode-aggregateBriefing:
    address: a2a.bode.aggregateBriefing
    messages:
      aggregateBriefingRequest:
        payload:
          type: object
          properties:
            sourceAgent:
              type: string
              description: Agent that initiated this flow

operations:
  invokeAggregateBriefing:
    action: send
    channel:
      $ref: "#/channels/bode-aggregateBriefing"
    messages:
      - $ref: "#/channels/bode-aggregateBriefing/messages/aggregateBriefingRequest"
