asyncapi: 3.0.0
info:
  title: "ML2 - maestro -> bode/orchestrationSummary"
  version: 1.0.0
  description: "HolidaiButler inter-agent flow ML2"

channels:
  bode-orchestrationSummary:
    address: a2a.bode.orchestrationSummary
    messages:
      orchestrationSummaryRequest:
        payload:
          type: object
          properties:
            sourceAgent:
              type: string
              description: Agent that initiated this flow

operations:
  invokeOrchestrationSummary:
    action: send
    channel:
      $ref: "#/channels/bode-orchestrationSummary"
    messages:
      - $ref: "#/channels/bode-orchestrationSummary/messages/orchestrationSummaryRequest"
