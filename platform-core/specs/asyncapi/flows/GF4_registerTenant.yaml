asyncapi: 3.0.0
info:
  title: "GF4 - onthaler -> boekhouder/registerTenant"
  version: 1.0.0
  description: "HolidaiButler inter-agent flow GF4"

channels:
  boekhouder-registerTenant:
    address: a2a.boekhouder.registerTenant
    messages:
      registerTenantRequest:
        payload:
          type: object
          properties:
            sourceAgent:
              type: string
              description: Agent that initiated this flow

operations:
  invokeRegisterTenant:
    action: send
    channel:
      $ref: "#/channels/boekhouder-registerTenant"
    messages:
      - $ref: "#/channels/boekhouder-registerTenant/messages/registerTenantRequest"
