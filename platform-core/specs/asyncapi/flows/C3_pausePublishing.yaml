asyncapi: 3.0.0
info:
  title: "C3 - kassier -> uitgever/pausePublishing"
  version: 1.0.0
  description: "HolidaiButler inter-agent flow C3"

channels:
  uitgever-pausePublishing:
    address: a2a.uitgever.pausePublishing
    messages:
      pausePublishingRequest:
        payload:
          type: object
          properties:
            sourceAgent:
              type: string
              description: Agent that initiated this flow

operations:
  invokePausePublishing:
    action: send
    channel:
      $ref: "#/channels/uitgever-pausePublishing"
    messages:
      - $ref: "#/channels/uitgever-pausePublishing/messages/pausePublishingRequest"
