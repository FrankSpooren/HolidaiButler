asyncapi: 3.0.0
info:
  title: "MS2 - magazijnier -> bode/sendStockAlert"
  version: 1.0.0
  description: "HolidaiButler inter-agent flow MS2"

channels:
  bode-sendStockAlert:
    address: a2a.bode.sendStockAlert
    messages:
      sendStockAlertRequest:
        payload:
          type: object
          properties:
            sourceAgent:
              type: string
              description: Agent that initiated this flow

operations:
  invokeSendStockAlert:
    action: send
    channel:
      $ref: "#/channels/bode-sendStockAlert"
    messages:
      - $ref: "#/channels/bode-sendStockAlert/messages/sendStockAlertRequest"
