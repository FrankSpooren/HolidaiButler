asyncapi: 3.0.0
info:
  title: "C1 - auditeur -> poortwachter/enforceCompliance"
  version: 1.0.0
  description: "HolidaiButler inter-agent flow C1"

channels:
  poortwachter-enforceCompliance:
    address: a2a.poortwachter.enforceCompliance
    messages:
      enforceComplianceRequest:
        payload:
          type: object
          properties:
            sourceAgent:
              type: string
              description: Agent that initiated this flow

operations:
  invokeEnforceCompliance:
    action: send
    channel:
      $ref: "#/channels/poortwachter-enforceCompliance"
    messages:
      - $ref: "#/channels/poortwachter-enforceCompliance/messages/enforceComplianceRequest"
