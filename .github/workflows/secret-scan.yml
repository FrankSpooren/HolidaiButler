name: Secret Scan

# CI Secret Scanning — HolidaiButler enterprise security policy
# - Runs on every push to dev/test/main and every PR
# - Uses gitleaks CLI binary (NOT gitleaks-action@v2) for full control + zero vendor lock-in
#   - Avoids GITLEAKS_LICENSE requirement (action requires license for org repos)
#   - Avoids env-var auto-discovery quirks (action does not pick up .gitleaks.baseline.json automatically)
#   - Matches local pre-commit behavior exactly (same gitleaks version 8.28.0)
# - Blocks merge on NEW findings (delta against .gitleaks.baseline.json)
#
# Version: 2.0 — 2026-06-10 (post Workflow-runs-fail bug; rewritten from gitleaks-action@v2)
# Policy: docs/security/SECURITY.md

on:
  push:
    branches: [dev, test, main]
  pull_request:
    branches: [dev, test, main]
  schedule:
    # Weekly full-history scan (Mondays 03:00 UTC) — catches drift from rule updates
    - cron: '0 3 * * 1'
  workflow_dispatch:  # allow manual trigger

permissions:
  contents: read
  pull-requests: write  # to comment scan results on PR
  issues: write          # for ::warning + ::error annotations on commit

env:
  GITLEAKS_VERSION: '8.28.0'

jobs:
  gitleaks:
    name: gitleaks secret-detection
    runs-on: ubuntu-latest
    outputs:
      findings_count: ${{ steps.scan.outputs.findings_count }}
      baseline_count: ${{ steps.scan.outputs.baseline_count }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history for accurate scan (baseline references historical SHAs)
          fetch-depth: 0

      - name: Install gitleaks ${{ env.GITLEAKS_VERSION }}
        run: |
          set -euo pipefail
          ARCH="linux_x64"
          URL="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_${ARCH}.tar.gz"
          echo "Downloading gitleaks v${GITLEAKS_VERSION} from ${URL}"
          curl -sSfL "${URL}" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          chmod +x /usr/local/bin/gitleaks
          gitleaks version

      - name: Verify config + baseline present
        run: |
          set -euo pipefail
          if [ ! -f .gitleaks.toml ]; then
            echo "::error::.gitleaks.toml not found in repo root — secret-scanning misconfigured"
            exit 1
          fi
          if [ ! -f .gitleaks.baseline.json ]; then
            echo "::warning::.gitleaks.baseline.json not found — running without baseline (all historical findings will be flagged as new)"
          fi
          echo "Config: $(wc -l < .gitleaks.toml) lines"
          if [ -f .gitleaks.baseline.json ]; then
            BASELINE_COUNT=$(jq 'length' .gitleaks.baseline.json)
            echo "Baseline: ${BASELINE_COUNT} historical findings tracked"
          fi

      - name: Run gitleaks scan (delta against baseline)
        id: scan
        run: |
          set +e
          BASELINE_FLAG=""
          if [ -f .gitleaks.baseline.json ]; then
            BASELINE_FLAG="--baseline-path .gitleaks.baseline.json"
          fi
          gitleaks detect \
            --config .gitleaks.toml \
            ${BASELINE_FLAG} \
            --no-banner \
            --redact \
            --report-format sarif \
            --report-path gitleaks-report.sarif \
            --exit-code 0 2>&1 | tee /tmp/gitleaks-stdout.log
          # Parse findings count from stdout
          FINDINGS=$(grep -oP 'leaks found: \K[0-9]+' /tmp/gitleaks-stdout.log | tail -1 || echo "0")
          BASELINE_COUNT=0
          if [ -f .gitleaks.baseline.json ]; then
            BASELINE_COUNT=$(jq 'length' .gitleaks.baseline.json)
          fi
          DELTA=$((FINDINGS - BASELINE_COUNT))
          echo "findings_count=${FINDINGS}" >> "$GITHUB_OUTPUT"
          echo "baseline_count=${BASELINE_COUNT}" >> "$GITHUB_OUTPUT"
          echo "::notice::Secret-scan complete: ${FINDINGS} total findings, ${BASELINE_COUNT} permanent-baseline tracked"
          if [ "${DELTA}" -gt 0 ]; then
            echo "::error::🔒 ${DELTA} NEW secret(s) detected beyond permanent baseline. Review SARIF report + rotate credentials per docs/security/SECURITY.md."
            exit 1
          fi
          echo "::notice::No NEW findings — clean delta vs baseline"

      - name: Upload SARIF report (for code-scanning + audit)
        if: always() && hashFiles('gitleaks-report.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks-report.sarif
          category: gitleaks
        continue-on-error: true  # SARIF upload requires Advanced Security on private repos; do not fail workflow if unavailable

  trufflehog-verified-scan:
    name: trufflehog verified secrets (deep scan)
    runs-on: ubuntu-latest
    # Run only on schedule + manual — too slow for every PR
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for verified-credential cross-check

      - name: Run trufflehog (verified-only mode)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ''
          head: ${{ github.ref_name }}
          extra_args: --only-verified --no-update

  notify-finding:
    name: notify finding
    runs-on: ubuntu-latest
    needs: [gitleaks]
    if: failure()
    steps:
      - name: Annotate PR/commit
        run: |
          echo "::error::🔒 NEW secret(s) detected in commit/PR (beyond ${{ needs.gitleaks.outputs.baseline_count }} permanent-baseline findings). See workflow logs."
          echo "::error::Total findings: ${{ needs.gitleaks.outputs.findings_count }} — delta exceeds baseline"
          echo "::error::Policy: docs/security/SECURITY.md — rotate credential immediately + strip from source + amend commit."
          echo "::error::Incident response template: docs/security/incidents/2026-06-10-owm-key-leak.md"
