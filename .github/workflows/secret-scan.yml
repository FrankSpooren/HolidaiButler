name: Secret Scan

# CI Secret Scanning — HolidaiButler enterprise security policy
# - gitleaks delta-scan on every push to dev/test/main and every PR
# - trufflehog deep verified-scan weekly (schedule) + manual
# - BOTH tools run as PINNED CLI binaries (not marketplace actions): full control,
#   reproducibility, zero vendor lock-in, supply-chain safety. Matches local
#   pre-commit behavior exactly (identical tool versions).
#
# Version: 3.0 — 2026-06-17
#   - trufflehog: marketplace action @main (unpinned; base/head diff bug -> exit 1
#     on schedule events, NOT a real finding) REPLACED by pinned CLI v3.95.5
#     full-history --only-verified --fail scan.
#   - SARIF: codeql-action/upload-sarif (needs GHAS + security-events:write on a
#     private repo -> "Resource not accessible by integration") REPLACED by a
#     plain audit artifact (no GHAS dependency, no recurring error).
#   - actions/checkout v4 -> v5 (Node 24 runtime; v4 = Node20 deprecation).
#   - permissions tightened to least-privilege (contents: read).
# Policy: docs/security/SECURITY.md

on:
  push:
    branches: [dev, test, main]
  pull_request:
    branches: [dev, test, main]
  schedule:
    # Weekly full-history verified scan (Mondays 03:00 UTC) — catches drift
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read   # least privilege; tools emit ::error/::warning annotations (no API perms needed)

env:
  GITLEAKS_VERSION: '8.28.0'
  TRUFFLEHOG_VERSION: '3.95.5'

jobs:
  gitleaks:
    name: gitleaks secret-detection
    runs-on: ubuntu-latest
    outputs:
      findings_count: ${{ steps.scan.outputs.findings_count }}
      baseline_count: ${{ steps.scan.outputs.baseline_count }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # full history; baseline references historical SHAs

      - name: Install gitleaks ${{ env.GITLEAKS_VERSION }}
        run: |
          set -euo pipefail
          URL="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSfL "${URL}" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          chmod +x /usr/local/bin/gitleaks
          gitleaks version

      - name: Verify config + baseline present
        run: |
          set -euo pipefail
          if [ ! -f .gitleaks.toml ]; then
            echo "::error::.gitleaks.toml not found in repo root — secret-scanning misconfigured"
            exit 1
          fi
          [ -f .gitleaks.baseline.json ] || echo "::warning::.gitleaks.baseline.json not found — all historical findings will be flagged as new"

      - name: Run gitleaks scan (delta against baseline)
        id: scan
        run: |
          set +e
          BASELINE_FLAG=""
          [ -f .gitleaks.baseline.json ] && BASELINE_FLAG="--baseline-path .gitleaks.baseline.json"
          gitleaks detect \
            --config .gitleaks.toml \
            ${BASELINE_FLAG} \
            --no-banner --redact \
            --report-format sarif --report-path gitleaks-report.sarif \
            --exit-code 0 2>&1 | tee /tmp/gitleaks-stdout.log
          FINDINGS=$(grep -oP 'leaks found: \K[0-9]+' /tmp/gitleaks-stdout.log | tail -1 || echo "0")
          BASELINE_COUNT=0
          [ -f .gitleaks.baseline.json ] && BASELINE_COUNT=$(jq 'length' .gitleaks.baseline.json)
          DELTA=$((FINDINGS - BASELINE_COUNT))
          echo "findings_count=${FINDINGS}" >> "$GITHUB_OUTPUT"
          echo "baseline_count=${BASELINE_COUNT}" >> "$GITHUB_OUTPUT"
          echo "::notice::Secret-scan complete: ${FINDINGS} total findings, ${BASELINE_COUNT} permanent-baseline tracked"
          if [ "${DELTA}" -gt 0 ]; then
            echo "::error::🔒 ${DELTA} NEW secret(s) detected beyond permanent baseline. Rotate per docs/security/SECURITY.md."
            exit 1
          fi
          echo "::notice::No NEW findings — clean delta vs baseline"

      - name: Upload SARIF as audit artifact
        if: always() && hashFiles('gitleaks-report.sarif') != ''
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-sarif
          path: gitleaks-report.sarif
          retention-days: 90

  trufflehog-verified-scan:
    name: trufflehog verified secrets (deep scan)
    runs-on: ubuntu-latest
    # Deep verified-credential scan: schedule + manual only (too slow per-PR)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # full history for verified-credential cross-check

      - name: Install trufflehog ${{ env.TRUFFLEHOG_VERSION }}
        run: |
          set -euo pipefail
          URL="https://github.com/trufflesecurity/trufflehog/releases/download/v${TRUFFLEHOG_VERSION}/trufflehog_${TRUFFLEHOG_VERSION}_linux_amd64.tar.gz"
          curl -sSfL "${URL}" -o /tmp/trufflehog.tar.gz
          tar -xzf /tmp/trufflehog.tar.gz -C /tmp trufflehog
          sudo mv /tmp/trufflehog /usr/local/bin/trufflehog
          chmod +x /usr/local/bin/trufflehog
          trufflehog --version

      - name: Run trufflehog (verified-only, full history)
        run: |
          set -euo pipefail
          # Pinned CLI replaces trufflesecurity/trufflehog@main (base/head diff bug
          # -> exit 1 on schedule). --fail => non-zero ONLY on real verified secrets.
          trufflehog git file://. --only-verified --no-update --fail 2>&1 | tee /tmp/trufflehog.log
          echo "::notice::trufflehog deep scan complete — no verified secrets"

  notify-finding:
    name: notify finding
    runs-on: ubuntu-latest
    needs: [gitleaks]
    if: failure()
    steps:
      - name: Annotate commit
        run: |
          echo "::error::🔒 NEW secret(s) detected (beyond ${{ needs.gitleaks.outputs.baseline_count }} permanent-baseline). See workflow logs."
          echo "::error::Total findings: ${{ needs.gitleaks.outputs.findings_count }} — delta exceeds baseline"
          echo "::error::Policy: docs/security/SECURITY.md — rotate credential immediately + strip from source + amend commit."
