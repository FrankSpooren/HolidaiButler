name: Secret Scan

# CI Secret Scanning — HolidaiButler enterprise security policy
# - Runs on every push to dev/test/main and every PR
# - Uses gitleaks with .gitleaks.toml ruleset
# - Blocks merge on finding (workflow returns non-zero exit code)
#
# Version: 1.0 — 2026-06-10 (post INC-2026-06-10-001)
# Policy: docs/security/SECURITY.md

on:
  push:
    branches: [dev, test, main]
  pull_request:
    branches: [dev, test, main]
  schedule:
    # Weekly full-history scan (Mondays 03:00 UTC) — catches drift from rule updates
    - cron: '0 3 * * 1'
  workflow_dispatch:  # allow manual trigger

permissions:
  contents: read
  pull-requests: write  # to comment scan results on PR

jobs:
  gitleaks:
    name: gitleaks secret-detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fetch full history for scheduled/manual full-scan runs;
          # PR runs scan delta automatically via gitleaks-action
          fetch-depth: ${{ github.event_name == 'pull_request' && 0 || 0 }}

      - name: Run gitleaks (delta-only, against baseline)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Configures gitleaks to use .gitleaks.toml in repo root
          GITLEAKS_CONFIG: .gitleaks.toml
          # Baseline = 133 historical findings tracked separately for triage (see
          # docs/security/SECURITY.md §10). Workflow flags only NEW findings since baseline.
          GITLEAKS_NOTIFY_USER_LIST: '@FrankSpooren'
          GITLEAKS_ENABLE_SUMMARY: true
          GITLEAKS_ENABLE_COMMENTS: true
        # gitleaks-action v2 picks up .gitleaks.baseline.json automatically when present

  trufflehog-verified-scan:
    name: trufflehog verified secrets (deep scan)
    runs-on: ubuntu-latest
    # Run only on schedule + manual — too slow for every PR
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for verified-credential cross-check

      - name: Run trufflehog (verified-only mode)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ''
          head: ${{ github.ref_name }}
          extra_args: --only-verified --no-update

  notify-finding:
    name: notify finding
    runs-on: ubuntu-latest
    needs: [gitleaks]
    if: failure()
    steps:
      - name: Annotate PR/commit
        run: |
          echo "::error::🔒 Secret detected in commit/PR. See workflow logs + .gitleaks.toml ruleset."
          echo "::error::Policy: docs/security/SECURITY.md — rotate credential immediately + amend commit."
          echo "::error::Incident response: docs/security/incidents/ template."
