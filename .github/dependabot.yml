      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Amsterdam"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "security"
      - "customer-portal"
    commit-message:
      prefix: "fix(deps)"
      include: "scope"
    groups:
      patches:
        applies-to: version-updates
        update-types:
          - "patch"
          - "minor"
      security:
        applies-to: security-updates

  # ─── ticketing-module (root + frontend + backend) ──────────────────────
