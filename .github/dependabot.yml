    commit-message:
      prefix: "fix(deps)"
      include: "scope"
    groups:
      patches:
        applies-to: version-updates
        update-types: ["patch", "minor"]
      security:
        applies-to: security-updates

  - package-ecosystem: "npm"
    directory: "/agenda-module/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Amsterdam"
    open-pull-requests-limit: 5
    labels: ["dependencies", "security", "agenda-frontend"]
    commit-message:
      prefix: "fix(deps)"
      include: "scope"
    groups:
      patches:
        applies-to: version-updates
        update-types: ["patch", "minor"]
      security:
        applies-to: security-updates

  - package-ecosystem: "npm"
    directory: "/agenda-module/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Amsterdam"
    open-pull-requests-limit: 5
    labels: ["dependencies", "security", "agenda-backend"]
    commit-message:
      prefix: "fix(deps)"
      include: "scope"
    groups:
      patches:
        applies-to: version-updates
        update-types: ["patch", "minor"]
      security:
        applies-to: security-updates

  # ─── GitHub Actions workflows ──────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Amsterdam"
    open-pull-requests-limit: 3
    labels: ["dependencies", "ci"]
    commit-message:
      prefix: "ci(deps)"
      include: "scope"
    groups:
      all-actions:
        applies-to: version-updates
        update-types: ["patch", "minor", "major"]
