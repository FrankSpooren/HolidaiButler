# gitleaks configuration for HolidaiButler monorepo
# https://github.com/gitleaks/gitleaks
#
# Combines gitleaks built-in default ruleset with HolidaiButler-specific patterns
# for credentials used in this platform.
#
# Version: 1.0 — 2026-06-10 (initial, post INC-2026-06-10-001)

# Use gitleaks' built-in default rules (covers AWS, GCP, Azure, GitHub PATs,
# Stripe, OpenAI, Slack tokens, generic API keys, private keys, etc.)
[extend]
useDefault = true

# ─────────────────────────────────────────────────────────────────────
# HolidaiButler-specific rules
# ─────────────────────────────────────────────────────────────────────

[[rules]]
id = "hb-openweathermap-api-key"
description = "OpenWeatherMap API key (32-char lowercase hex string in URL/code)"
regex = '''(?i)(openweathermap[^"']{0,30}|api\.openweathermap\.org[^"']{0,200})[?&]?appid\s*=\s*['"]?([a-f0-9]{32})['"]?'''
secretGroup = 2
tags = ["openweathermap", "api-key"]

[[rules]]
id = "hb-mistral-api-key"
description = "Mistral AI API key"
regex = '''(?i)mistral[_-]?(api[_-]?)?key\s*[=:]\s*['"]([a-zA-Z0-9]{32,})['"]'''
secretGroup = 2
tags = ["mistral", "api-key"]

[[rules]]
id = "hb-deepl-api-key"
description = "DeepL API key (Pro or Free format)"
regex = '''(?i)deepl[_-]?(api[_-]?)?key\s*[=:]\s*['"]([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}(:fx)?)['"]'''
secretGroup = 2
tags = ["deepl", "api-key"]

[[rules]]
id = "hb-anthropic-api-key"
description = "Anthropic Claude API key"
regex = '''sk-ant-(api|sid|adm)\d{2}-[a-zA-Z0-9_-]{80,}'''
tags = ["anthropic", "api-key"]

[[rules]]
id = "hb-pixtral-api-key"
description = "Pixtral API key (Mistral-vision)"
regex = '''(?i)pixtral[_-]?(api[_-]?)?key\s*[=:]\s*['"]([a-zA-Z0-9]{32,})['"]'''
secretGroup = 2
tags = ["pixtral", "api-key"]

[[rules]]
id = "hb-apify-token"
description = "Apify Actor/User token"
regex = '''(?i)apify[_-]?(token|api[_-]?key)\s*[=:]\s*['"]apify_api_[a-zA-Z0-9]{24,}['"]'''
tags = ["apify", "token"]

[[rules]]
id = "hb-mailerlite-api-key"
description = "MailerLite API key"
regex = '''(?i)mailerlite[_-]?(api[_-]?)?key\s*[=:]\s*['"]([a-zA-Z0-9]{32,})['"]'''
secretGroup = 2
tags = ["mailerlite", "api-key"]

[[rules]]
id = "hb-hetzner-api-token"
description = "Hetzner Cloud API token"
regex = '''(?i)hetzner[_-]?(cloud[_-]?)?(api[_-]?)?token\s*[=:]\s*['"]([a-zA-Z0-9]{32,})['"]'''
secretGroup = 3
tags = ["hetzner", "token"]

[[rules]]
id = "hb-sentry-dsn"
description = "Sentry DSN"
regex = '''https://[a-f0-9]{32,}@[a-z0-9.-]+\.(sentry\.io|ingest\.sentry\.io)/[0-9]+'''
tags = ["sentry", "dsn"]

[[rules]]
id = "hb-meta-system-user-token"
description = "Meta (Facebook/Instagram) System User token"
regex = '''EAA[a-zA-Z0-9]{100,}'''
tags = ["meta", "facebook", "instagram", "token"]

[[rules]]
id = "hb-mongodb-connection-string"
description = "MongoDB connection string with embedded credentials"
regex = '''mongodb(\+srv)?://[a-zA-Z0-9_-]+:[^@\s]+@[a-z0-9.-]+'''
tags = ["mongodb", "database", "credentials"]

[[rules]]
id = "hb-mysql-connection-string"
description = "MySQL/MariaDB connection string with embedded credentials"
regex = '''mysql://[a-zA-Z0-9_-]+:[^@\s]+@[a-z0-9.-]+:\d+/[a-zA-Z0-9_-]+'''
tags = ["mysql", "database", "credentials"]

[[rules]]
id = "hb-jwt-session-secret-assignment"
description = "Hardcoded JWT/session secret assignment with non-trivial value"
regex = '''(?i)(JWT_SECRET|SESSION_SECRET|COOKIE_SECRET|CSRF_SECRET)\s*[=:]\s*['"]([a-zA-Z0-9!@#$%^&*()_+=\-/]{20,})['"]'''
secretGroup = 2
tags = ["jwt", "session", "secret"]

[[rules]]
id = "hb-private-key-block"
description = "PEM-encoded private key"
regex = '''-----BEGIN ((RSA|EC|DSA|OPENSSH|PRIVATE) )?PRIVATE KEY( BLOCK)?-----'''
tags = ["private-key"]

[[rules]]
id = "hb-fallback-credential-pattern"
description = "Anti-pattern: process.env.X || 'literal' — literal acts as production fallback (INC-001, INC-002, INC-003 repeat offender)"
regex = '''process\.env\.[A-Z_]+\s*\|\|\s*['"][a-zA-Z0-9_\-]{16,}['"]'''
tags = ["antipattern", "fallback-credential"]

# ─────────────────────────────────────────────────────────────────────
# Allowlist — false positives en legitieme placeholders
# ─────────────────────────────────────────────────────────────────────

[allowlist]
description = "Allowlisted files, paths, and patterns"

paths = [
  '''(.*?)(\.env\.example|\.env\.template|\.env\.sample|\.env\.production\.template|\.env\.production\.example)''',
  '''(.*?)docs/security/.*''',
  '''(.*?)\.gitleaks\.toml''',
  '''(.*?)node_modules/.*''',
  '''(.*?)\.next/.*''',
  '''(.*?)dist/.*''',
  '''(.*?)build/.*''',
  '''(.*?)coverage/.*''',
  '''(.*?)\.git/.*''',
  '''(.*?)package-lock\.json''',
  '''(.*?)yarn\.lock''',
  '''(.*?)pnpm-lock\.yaml''',
  # Legacy archive (read-only, pre-INC-2026-06-10-001 docs).
  # All historical credentials inside are revoked/expired (trufflehog verified=0).
  # New code MUST NOT be added to this path — see docs/security/SECURITY.md §10.
  '''(.*?)original-source/.*''',
  '''(.*?)Original docs/.*''',
  # Damage-assessment + remediation scripts (one-off fase_r* helpers — read-only history)
  '''(.*?)fase_r[0-9].*\.py$''',
  # Historical chat-log archives (read-only)
  '''(.*?)CLAUDE_HISTORY\.md$''',
  # Env templates/scripts (dummy creds for onboarding — actual secrets in PM2 / .env / GitHub Secrets)
  '''(.*?)env-example\.sh$''',
  '''(.*?)env_deployment\.sh$''',
  '''(.*?)docker-compose\.txt$''',
  # Test fixtures (synthetic data, not real credentials)
  '''(.*?)__tests__/.*\.(test|spec)\.(js|ts|jsx|tsx)$''',
  '''(.*?)\.(test|spec)\.(js|ts|jsx|tsx)$''',
  # GitHub Actions workflows — credentials are ${{ secrets.X }} references, not literal values
  '''(.*?)\.github/workflows/.*\.ya?ml$''',
  # Notion/project description templates (contain dummy connection strings for documentation)
  '''(.*?)holidaibutler-project\.ts$''',
  # One-off data-fix scripts (executed once, immutable)
  '''(.*?)steekproef_fix_.*\.py$''',
]

regexes = [
  # Placeholder patterns in .env.example or docs
  '''your_[a-z_]+_(key|token|secret|here)''',
  '''<your[_-][a-z]+[_-](key|token|secret)>''',
  '''YOUR_[A-Z_]+''',                                       # uppercase placeholders (YOUR_TOKEN, YOUR_API_KEY)
  '''your-[a-z-]+-(token|key|secret|password)''',           # kebab-case dummies (your-secret-key)
  '''your-secret-key''',                                    # common literal placeholder
  '''your-secret-key-change-in-production''',               # canonical docs placeholder
  '''your-super-secret-key-min-[0-9]+-chars''',             # instructive docs placeholder
  '''REPLACE_(WITH|ME)''',
  '''\$\{[A-Z_]+\}''',
  '''xxx+''',
  '''dummy''',
  '''example''',
  '''CHANGEME''',
  # Common dummy/template credential patterns in connection strings + docs
  '''username:password''',
  '''user:pass''',
  '''<user>:<pass>''',
  '''<username>:<password>''',
  '''USERNAME:PASSWORD''',
  '''<DB_USER>:<DB_PASS>''',
  # hb-fallback-credential-pattern false-positive elimination:
  # URLs, model-names, service-names, env-state-strings are not secrets but match
  # the structural pattern process.env.X || 'value-with-20+-chars'
  '''://''',                                                # URL fragments (http://, https://, mongodb://)
  '''localhost''',                                          # local dev URLs
  '''mistral-[a-z0-9-]+''',                                 # Mistral model names (mistral-small-latest, mistral-medium-latest, mistral-vision-latest)
  '''pixtral-[a-z0-9-]+''',                                 # Pixtral model names (pixtral-12b-2409)
  '''claude-[a-z0-9-]+''',                                  # Anthropic model names
  '''gpt-[a-z0-9-]+''',                                     # OpenAI model names
  '''hb-[a-z-]+''',                                         # HB service names (hb-platform-core, hb-temporal-worker, etc.)
  '''(development|production|staging|unknown|default|none)''',  # Env-state strings
  '''dev-[a-z-]+-(in-production|secret|fallback)''',        # Developer placeholder secrets (still flagged via separate review-list — see SECURITY.md §10.2)
  # GitHub Actions secret references (template expressions, not literal values)
  '''\$\{\{\s*secrets\.[A-Z_]+\s*\}\}''',
  # Test fixtures (synthetic)
  '''sk-test-[a-zA-Z0-9]+''',
  '''test_secret_[a-zA-Z0-9]+''',
  '''idempotency-key.*:\s*['"][a-zA-Z0-9_-]+['"]''',
]

stopwords = [
  "example",
  "placeholder",
  "dummy",
  "test",
  "demo",
  "sample",
]
