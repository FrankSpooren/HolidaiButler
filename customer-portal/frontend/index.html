<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <!-- Multi-destination Customer Portal -->
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="%VITE_APP_ICON%" />
    <link rel="apple-touch-icon" href="%VITE_APP_ICON%" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="%VITE_APP_DESCRIPTION%" />
    <meta name="theme-color" content="%VITE_THEME_COLOR%" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://%VITE_APP_DOMAIN%/" />
    <meta property="og:title" content="%VITE_APP_NAME% - %VITE_APP_TAGLINE%" />
    <meta property="og:description" content="%VITE_APP_DESCRIPTION%" />
    <meta property="og:image" content="https://%VITE_APP_DOMAIN%%VITE_APP_ICON%" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://%VITE_APP_DOMAIN%/" />
    <meta name="twitter:title" content="%VITE_APP_NAME% - %VITE_APP_TAGLINE%" />
    <meta name="twitter:description" content="%VITE_APP_DESCRIPTION%" />
    <meta name="twitter:image" content="https://%VITE_APP_DOMAIN%%VITE_APP_ICON%" />

    <!-- Inter font from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" /></noscript>
    <!-- Meta Pixel Code (only loads if VITE_META_PIXEL_ID is set — Calpe only) -->
    <script>
      (function(){var pid="%VITE_META_PIXEL_ID%";if(!pid||pid.charAt(0)==="%"||!/^[0-9]+$/.test(pid))return;
      !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;
      t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,document,'script','https://connect.facebook.net/en_US/fbevents.js');
      fbq('init',pid);fbq('track','PageView');})();
    </script>
    <noscript><img height="1" width="1" style="display:none" src="https://www.facebook.com/tr?id=%VITE_META_PIXEL_ID%&ev=PageView&noscript=1" /></noscript>
    <!-- End Meta Pixel Code -->
    <!-- Leaflet CSS loaded dynamically by MapView component -->
    <title>%VITE_APP_NAME% - %VITE_APP_TAGLINE%</title>
  </head>
  <body>
    <script>!function(){var l=new URLSearchParams(location.search).get("lang");if(l&&["nl","en","de","es"].indexOf(l)!==-1)localStorage.setItem("language",l)}()</script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- 100% privacy-first analytics -->
    <script async defer src="https://scripts.simpleanalyticscdn.com/latest.js"></script>
    <script async data-collect="outbound,emails,downloads" data-extensions="pdf,csv,docx,xlsx,zip" data-use-title="true" src="https://scripts.simpleanalyticscdn.com/auto-events.js"></script>
    <noscript><img src="https://queue.simpleanalyticscdn.com/noscript.gif" alt="" referrerpolicy="no-referrer-when-downgrade" /></noscript>
  </body>
</html>
